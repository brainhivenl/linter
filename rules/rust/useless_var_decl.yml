# yaml-language-server: $schema=https://raw.githubusercontent.com/ast-grep/ast-grep/main/schemas/rule.json

id: rust/useless_var_decl
message: Declaring a variable to another variable is useless, please remove it
severity: error # error, warning, info, hint
language: Rust
rule:
  pattern: let $A = $$$;
  precedes:
    pattern: let $B = $A;
