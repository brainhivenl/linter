# yaml-language-server: $schema=https://raw.githubusercontent.com/ast-grep/ast-grep/main/schemas/rule.json

id: go/var_camelcase
message: Variables should be in camelcase
severity: error
language: Go
rule:
  any:
    - kind: expression_list
      inside:
        kind: short_var_declaration
        field: left
      has:
        kind: identifier
        regex: .+_
    - kind: var_spec > identifier
      regex: .+_
  not:
    inside:
      kind: source_file
      stopBy: end
      has:
        kind: comment
        regex: Code generated by sqlc. DO NOT EDIT.
